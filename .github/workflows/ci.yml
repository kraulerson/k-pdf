name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy k_pdf/

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install Qt dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon0

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run pytest --cov=k_pdf --cov-report=term-missing --cov-fail-under=80
        env:
          QT_QPA_PLATFORM: offscreen

  security:
    name: Security Scans
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Semgrep SAST scan
        run: |
          pip install semgrep
          semgrep scan --config auto k_pdf/ --error

      - name: pip-audit (dependency vulnerabilities)
        run: uv run pip-audit

      - name: pip-licenses (license compliance)
        run: uv run pip-licenses --order=license

      - name: Gitleaks (secret detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.os }})
    needs: [lint, test, security]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install Qt dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon0

      - name: Install dependencies
        run: uv sync

      - name: Nuitka build (standalone)
        shell: bash
        run: |
          NUITKA_ARGS=(
            --standalone
            --assume-yes-for-downloads
            --output-dir=build
            --enable-plugin=pyside6
            --product-name=K-PDF
            --product-version=0.1.0
            --file-description="K-PDF - Free PDF Reader and Editor"
            # Exclude pymupdf/fitz from Nuitka C compilation entirely.
            # PyMuPDF's mupdf.py (2.5 MB SWIG binding) generates a C file
            # that takes 30+ min to compile and uses 2+ GB RAM, causing OOM
            # on CI runners. Instead, we copy the packages as-is post-build.
            --nofollow-import-to=pymupdf
            --nofollow-import-to=fitz
            --no-deployment-flag=excluded-module-usage
            # Exclude unused PySide6 modules to reduce size and build time
            --nofollow-import-to=PySide6.QtWebEngine
            --nofollow-import-to=PySide6.QtWebEngineCore
            --nofollow-import-to=PySide6.QtWebEngineWidgets
            --nofollow-import-to=PySide6.Qt3DCore
            --nofollow-import-to=PySide6.Qt3DRender
            --nofollow-import-to=PySide6.Qt3DInput
            --nofollow-import-to=PySide6.Qt3DLogic
            --nofollow-import-to=PySide6.Qt3DExtras
            --nofollow-import-to=PySide6.Qt3DAnimation
            --nofollow-import-to=PySide6.QtMultimedia
            --nofollow-import-to=PySide6.QtRemoteObjects
            --nofollow-import-to=PySide6.QtBluetooth
            --nofollow-import-to=PySide6.QtNfc
            --nofollow-import-to=PySide6.QtSensors
            --nofollow-import-to=PySide6.QtSerialPort
            --nofollow-import-to=PySide6.QtTest
            --nofollow-import-to=PySide6.QtQuick
            --nofollow-import-to=PySide6.QtQml
            --nofollow-import-to=PySide6.QtDesigner
            --nofollow-import-to=PySide6.QtHelp
          )

          # Platform-specific flags
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            NUITKA_ARGS+=(
              --macos-create-app-bundle
              --macos-app-icon=k_pdf/resources/icons/k-pdf-icon.icns
            )
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            NUITKA_ARGS+=(
              --windows-console-mode=disable
              --windows-icon-from-ico=k_pdf/resources/icons/k-pdf-icon.ico
            )
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            NUITKA_ARGS+=(
              --linux-icon=k_pdf/resources/icons/k-pdf-icon.png
            )
          fi

          uv run python -m nuitka "${NUITKA_ARGS[@]}" k_pdf/main.py
        timeout-minutes: 60

      - name: Copy PyMuPDF packages into standalone dist
        shell: bash
        run: |
          # PyMuPDF was excluded from Nuitka compilation (too large for C
          # compilation). Copy the full packages from site-packages so they
          # are available as standard Python imports at runtime.
          PYMUPDF_DIR=$(uv run python -c "import pymupdf, pathlib; print(pathlib.Path(pymupdf.__file__).parent)")
          FITZ_DIR=$(uv run python -c "import fitz, pathlib; print(pathlib.Path(fitz.__file__).parent)")

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            DIST=build/main.app/Contents/MacOS
          else
            DIST=build/main.dist
          fi

          # Remove any partial data-only dirs Nuitka created, then copy full packages
          rm -rf "$DIST/pymupdf" "$DIST/fitz"
          cp -R "$PYMUPDF_DIR" "$DIST/pymupdf"
          cp -R "$FITZ_DIR" "$DIST/fitz"

          echo "PyMuPDF package copied to $DIST/pymupdf/ ($(du -sh "$DIST/pymupdf" | cut -f1))"

      - name: Sign macOS app bundle
        if: runner.os == 'macOS'
        run: |
          cd build/main.app/Contents
          mkdir -p Frameworks
          mv MacOS/lib*.dylib Frameworks/ 2>/dev/null || true
          for dylib in Frameworks/*.dylib; do
            name=$(basename "$dylib")
            install_name_tool -change "@rpath/$name" "@executable_path/../Frameworks/$name" MacOS/main 2>/dev/null || true
            install_name_tool -change "$name" "@executable_path/../Frameworks/$name" MacOS/main 2>/dev/null || true
          done
          install_name_tool -add_rpath @executable_path/../Frameworks MacOS/main 2>/dev/null || true
          find Frameworks -name '*.dylib' -exec codesign --force --sign - {} \;
          find MacOS -name '*.so' -exec codesign --force --sign - {} \; 2>/dev/null || true
          codesign --force --sign - MacOS/main
          cd ../../..
          codesign --force --sign - build/main.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: k-pdf-${{ matrix.os }}
          path: build/
          retention-days: 7
