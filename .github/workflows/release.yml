name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: K-PDF-linux
          - os: windows-latest
            artifact: K-PDF-windows
          - os: macos-latest
            artifact: K-PDF-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install Qt dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon0

      - name: Install dependencies
        run: uv sync

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Nuitka build (standalone)
        shell: bash
        run: |
          NUITKA_ARGS=(
            --standalone
            --assume-yes-for-downloads
            --output-dir=build
            --enable-plugin=pyside6
            --product-name=K-PDF
            --product-version=${{ steps.version.outputs.version }}
            --file-description="K-PDF - Free PDF Reader and Editor"
            # Include resource files (QSS themes, icons)
            --include-data-dir=k_pdf/resources=k_pdf/resources
            # Exclude pymupdf/fitz from Nuitka C compilation entirely.
            --nofollow-import-to=pymupdf
            --nofollow-import-to=fitz
            --no-deployment-flag=excluded-module-usage
            # Exclude unused PySide6 modules to reduce size and build time
            --nofollow-import-to=PySide6.QtWebEngine
            --nofollow-import-to=PySide6.QtWebEngineCore
            --nofollow-import-to=PySide6.QtWebEngineWidgets
            --nofollow-import-to=PySide6.Qt3DCore
            --nofollow-import-to=PySide6.Qt3DRender
            --nofollow-import-to=PySide6.Qt3DInput
            --nofollow-import-to=PySide6.Qt3DLogic
            --nofollow-import-to=PySide6.Qt3DExtras
            --nofollow-import-to=PySide6.Qt3DAnimation
            --nofollow-import-to=PySide6.QtMultimedia
            --nofollow-import-to=PySide6.QtRemoteObjects
            --nofollow-import-to=PySide6.QtBluetooth
            --nofollow-import-to=PySide6.QtNfc
            --nofollow-import-to=PySide6.QtSensors
            --nofollow-import-to=PySide6.QtSerialPort
            --nofollow-import-to=PySide6.QtTest
            --nofollow-import-to=PySide6.QtQuick
            --nofollow-import-to=PySide6.QtQml
            --nofollow-import-to=PySide6.QtDesigner
            --nofollow-import-to=PySide6.QtHelp
          )

          # Platform-specific flags
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            NUITKA_ARGS+=(
              --macos-create-app-bundle
              --macos-app-icon=k_pdf/resources/icons/k-pdf-icon.icns
            )
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            NUITKA_ARGS+=(
              --windows-console-mode=disable
              --windows-icon-from-ico=k_pdf/resources/icons/k-pdf-icon.ico
            )
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            NUITKA_ARGS+=(
              --linux-icon=k_pdf/resources/icons/k-pdf-icon.png
            )
          fi

          uv run python -m nuitka "${NUITKA_ARGS[@]}" k_pdf/main.py
        timeout-minutes: 60

      - name: Copy PyMuPDF packages into standalone dist
        shell: bash
        run: |
          PYMUPDF_DIR=$(uv run python -c "import pymupdf, pathlib; print(pathlib.Path(pymupdf.__file__).parent)")
          FITZ_DIR=$(uv run python -c "import fitz, pathlib; print(pathlib.Path(fitz.__file__).parent)")

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            # On macOS, put Python packages in Resources (not MacOS)
            # to avoid codesign rejecting .py files in the code directory
            DIST=build/main.app/Contents/Resources/python-packages
            mkdir -p "$DIST"
          else
            DIST=build/main.dist
          fi

          rm -rf "$DIST/pymupdf" "$DIST/fitz"
          cp -R "$PYMUPDF_DIR" "$DIST/pymupdf"
          cp -R "$FITZ_DIR" "$DIST/fitz"

          echo "PyMuPDF package copied to $DIST/pymupdf/ ($(du -sh "$DIST/pymupdf" | cut -f1))"

          # On macOS, remove stray .py/.pyc files from MacOS/ (codesign rejects them)
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            find build/main.app/Contents/MacOS -maxdepth 1 -name '*.py' -delete
            find build/main.app/Contents/MacOS -maxdepth 1 -name '*.pyc' -delete
          fi

      # --- macOS: Sign, notarize, and create DMG ---
      - name: Import signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm $RUNNER_TEMP/certificate.p12

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Install Apple intermediate certificate for Developer ID
          curl -sO https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security add-certificates -k "$KEYCHAIN_PATH" DeveloperIDG2CA.cer
          rm DeveloperIDG2CA.cer

          # Verify
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign macOS app bundle
        if: runner.os == 'macOS'
        run: |
          IDENTITY="Developer ID Application: Karl Raulerson (M6M33BX75L)"
          APP=build/main.app

          # Sign ALL Mach-O binaries inside-out
          # Find every Mach-O file (regardless of extension) and sign it
          find "$APP" -type f -exec sh -c '
            file "$1" | grep -q "Mach-O" && \
            codesign --force --options runtime --timestamp --sign "$2" "$1" 2>/dev/null
          ' _ {} "$IDENTITY" \;

          # Re-sign the main executable and bundle last (inside-out order)
          codesign --force --options runtime --timestamp --sign "$IDENTITY" \
            "$APP/Contents/MacOS/main"
          codesign --force --options runtime --timestamp --sign "$IDENTITY" "$APP"

          echo "Signing complete. Verifying..."
          codesign --verify --deep --strict "$APP"
          echo "Signature valid."

      - name: Notarize macOS app
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create a zip for notarization submission
          ditto -c -k --keepParent build/main.app build/main.zip

          # Submit for notarization and capture the submission ID
          SUBMIT_OUTPUT=$(xcrun notarytool submit build/main.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 600 2>&1) || true
          echo "$SUBMIT_OUTPUT"

          # Extract submission ID and check status
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
          STATUS=$(echo "$SUBMIT_OUTPUT" | grep "status:" | head -1 | awk '{print $2}')

          # Always fetch the notarization log for debugging
          if [ -n "$SUBMISSION_ID" ]; then
            echo "=== Notarization Log ==="
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" 2>&1 || true
            echo "=== End Log ==="
          fi

          # Fail if notarization was rejected
          if [ "$STATUS" = "Invalid" ]; then
            echo "::error::Notarization REJECTED. Check the log above for details."
            exit 1
          fi

          # Staple the notarization ticket
          for i in 1 2 3 4 5; do
            echo "Staple attempt $i..."
            if xcrun stapler staple build/main.app; then
              echo "Stapling successful."
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "Stapling failed after 5 attempts. Proceeding without staple."
            else
              echo "Waiting 30s for Apple CDN propagation..."
              sleep 30
            fi
          done

          rm build/main.zip

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cd build
          tar -czf "K-PDF-${{ steps.version.outputs.version }}-linux.tar.gz" main.dist/
          ls -lh "K-PDF-${{ steps.version.outputs.version }}-linux.tar.gz"

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build
          sleep 5  # ensure notarize zip handle is released
          hdiutil create -volname "K-PDF" \
            -srcfolder main.app \
            -ov -format UDZO \
            "K-PDF-${{ steps.version.outputs.version }}-macos.dmg"
          ls -lh "K-PDF-${{ steps.version.outputs.version }}-macos.dmg"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd build
          Compress-Archive -Path main.dist\* -DestinationPath "K-PDF-${{ steps.version.outputs.version }}-windows.zip"
          Get-ChildItem "K-PDF-${{ steps.version.outputs.version }}-windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/K-PDF-*.tar.gz
            build/K-PDF-*.dmg
            build/K-PDF-*.zip
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "K-PDF v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            artifacts/K-PDF-linux/K-PDF-*.tar.gz
            artifacts/K-PDF-macos/K-PDF-*.dmg
            artifacts/K-PDF-windows/K-PDF-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
